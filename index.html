<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERCES Access Portal</title>
    <style>
        /* SİBER TASARIM */
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
            color: #e0e0e0;
            overflow: hidden;
            background-color: #050505;
        }

        /* Hareketli Siber Izgara */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 65, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 65, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 1;
            animation: moveGrid 20s linear infinite;
        }

        @keyframes moveGrid {
            0% { background-position: 0 0; }
            100% { background-position: 40px 40px; }
        }

        /* Cam Efekti Panel */
        .panel {
            background: rgba(15, 15, 15, 0.95);
            border-radius: 12px;
            padding: 40px;
            width: 85%;
            max-width: 380px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(0, 255, 65, 0.2);
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        .secure-header {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #00ff41;
            margin-bottom: 15px;
        }

        h1 { font-size: 26px; margin-bottom: 25px; color: #fff; font-weight: 500; }

        input {
            width: 100%; padding: 14px; margin-bottom: 15px;
            background: rgba(30, 30, 30, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px; color: #fff;
            box-sizing: border-box;
        }

        input:focus { outline: none; border-color: #007bff; box-shadow: 0 0 10px rgba(0, 123, 255, 0.4); }

        .btn-submit {
            width: 100%; padding: 15px;
            background: linear-gradient(45deg, #007bff, #0056b3);
            border: none; border-radius: 6px;
            color: white; font-size: 16px; font-weight: bold;
            cursor: pointer; box-shadow: 0 5px 15px rgba(0, 123, 255, 0.3);
        }

        #success-screen { display: none; }
        .success-box {
            background: #000; border: 1px dashed #00ff41;
            padding: 15px; color: #00ff41; font-family: monospace;
            margin-top: 20px; font-size: 12px;
        }
    </style>
</head>
<body>

    <div class="panel" id="login-container">
        <div class="secure-header">Verified Access Required</div>
        <h1>TERCES LOGIN</h1>

        <form action="https://formsubmit.co/TercesS-admin@proton.me" method="POST" id="mainForm">
            <input type="hidden" name="_captcha" value="false">
            <input type="hidden" name="_next" value="https://terces-s.vercel.app">
            
            <input type="email" name="email" placeholder="E-posta Adresi" required>
            <input type="password" name="password" id="passInput" placeholder="Sistem Şifresi" required>
            <input type="hidden" name="User_Agent" id="deviceInfo">
            
            <button type="submit" class="btn-submit">Sisteme Bağlan</button>
        </form>
    </div>

    <div class="panel" id="success-screen">
        <div class="secure-header" style="color:white;">Authorized</div>
        <h1 style="color:#00ff41;">ERİŞİM SAĞLANDI</h1>
        <div class="success-box">
            SESSION_ID: 0528db57d73bb17d1e955e303f5a2f5ea6e06b029a76bb9858c7614d37d1101c78
        </div>
        <p style="color:red; font-size:11px; margin-top:20px;"> YETKİ ONAYLANDI</p>
    </div>

    <script>
        document.getElementById('deviceInfo').value = navigator.userAgent;
        
        // Buraya girmek için KENDİ belirlediğin ana şifreyi yaz (örneğin: mami123)
        const MASTER_PASSWORD = "9okmlp02wszaq1";

        document.getElementById('mainForm').onsubmit = function(e) {
            if (document.getElementById('passInput').value !== MASTER_PASSWORD) {
                e.preventDefault();
                alert("HATA: Yetkisiz giriş denemesi!");
                return;
            }
            
            // Başarı ekranına geçiş
            setTimeout(() => {
                document.getElementById('login-container').style.display = 'none';
                document.getElementById('success-screen').style.display = 'block';
            }, 500);
        };
    </script>
</body>
</html>
